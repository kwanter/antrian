# Antrian Workflow Add Or Modify Database Table

## Action

Follow the add-or-modify-database-table workflow:
1. Create or update migration file in backend/database/migrations/
2. Update corresponding Eloquent model in backend/app/Models/
3. Update or create related factory in backend/database/factories/ (if needed)
4. Update or create related resource in backend/app/Http/Resources/ (if needed)
5. Update controller logic in backend/app/Http/Controllers/Api/ (if needed)
6. Write or update tests in backend/tests/Feature/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/database/migrations/*.php, backend/app/Models/*.php, backend/database/factories/*.php

